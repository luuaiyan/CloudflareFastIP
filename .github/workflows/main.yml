name: CloudflareFastIP Checker

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install --with-deps chromium
          else
            playwright install-deps chromium
          fi

      - name: 运行测速脚本生成结果
        run: |
          python fastip.py

      - name: 更新 README
        run: |
          python << 'EOF'
          import re
          from datetime import datetime, timezone, timedelta

          # 北京时间
          tz = timezone(timedelta(hours=8))
          now = datetime.now(tz).strftime("%Y-%m-%d %H:%M:%S")

          # 分别读取 IPv4 和 IPv6 的 Top5
          with open("ipv4-top5.txt","r",encoding="utf-8") as f:
              v4_result = f.read().strip()
          with open("ipv6-top5.txt","r",encoding="utf-8") as f:
              v6_result = f.read().strip()

          # 读取 README
          with open("README.md","r",encoding="utf-8") as f:
              readme = f.read()

          new_block = f"""> 🕒 **最后更新时间:** {now} (北京时间)

          ### 🟢 IPv4 优选节点 (Top 5)
          ```text
          {v4_result}
          ```

          ### 🔵 IPv6 优选节点 (Top 5)
          ```text
          {v6_result}
          ```
          """

          new_readme = re.sub(
              r".*?",
              new_block,
              readme,
              flags=re.S
          )

          with open("README.md","w",encoding="utf-8") as f:
              f.write(new_readme)

          print("✅ README 双栈数据更新完成")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 别忘了把新增的两个 txt 文件也加进 git 里
          git add README.md result.txt ipv4-top5.txt ipv6-top5.txt

          if git diff --staged --quiet; then
            echo "没有变化，不提交"
          else
            git commit -m "🤖 Auto update IPv4 & IPv6 FastIP results"
            git push
          fi
