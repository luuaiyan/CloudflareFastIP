name: Daily FastIP Checker

on:
  schedule:
    # 定时任务：每天北京时间早上6点运行 (UTC时间前一天22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 这个配置允许你在网页上手动点击按钮立即运行测试

jobs:
  run-checker:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的 Ubuntu 服务器

    steps:
    - name: 检出代码 (Checkout)
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Playwright 的浏览器内核及系统依赖
        playwright install --with-deps chromium

    - name: 运行测速脚本并将结果保存到文本
      run: |
        # 运行代码，并将终端里的输出同时保存到 result.txt 中
        python fastip.py > result.txt
        # 在 GitHub Actions 日志中打印出来，方便直接查看
        cat result.txt

    - name: 上传测速结果为附件 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: IP-Ranking-Result
        path: result.txt
        retention-days: 7 # 结果文件保留 7 天
