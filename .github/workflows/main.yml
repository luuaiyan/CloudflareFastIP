name: CloudflareFastIP Checker

on:
  schedule:
    - cron: '0 22 * * *'  # 每天北京时间早上 6 点运行
  workflow_dispatch:      # 允许手动随时触发

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install --with-deps chromium
          else
            playwright install-deps chromium
          fi

      - name: 运行测速脚本生成结果
        run: |
          python fastip.py

      - name: 更新 README
        run: |
          # 将完美的 Python 逻辑写入临时脚本，彻底避免 YAML 缩进坑
          cat << 'EOF' > update_readme.py
          import re
          from datetime import datetime, timezone, timedelta

          tz = timezone(timedelta(hours=8))
          now = datetime.now(tz).strftime("%Y-%m-%d %H:%M:%S")

          with open("ipv4-top5.txt", "r", encoding="utf-8") as f:
              v4_result = f.read().replace('\x00', '').strip()

          with open("ipv6-top5.txt", "r", encoding="utf-8") as f:
              v6_result = f.read().replace('\x00', '').strip()

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          # ──────────────── 核心：定义标记 ────────────────
          start_marker = "<!-- CLOUDFLARE-FASTIP:START -->"
          end_marker   = "<!-- CLOUDFLARE-FASTIP:END -->"

          # 组装新内容块 (\n 保证了排版的整洁，不会有多余的缩进空格)
          new_section = f"{start_marker}\n> 🕒 **最后更新时间:** {now} (北京时间)\n\n### 🟢 IPv4 优选节点 (Top 5)\n```text\n{v4_result}\n```\n\n### 🔵 IPv6 优选节点 (Top 5)\n```text\n{v6_result}\n```\n{end_marker}"

          # 动态匹配并替换
          pattern = f"{start_marker}.*?{end_marker}"
          new_readme = re.sub(pattern, new_section, readme, flags=re.S)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("✅ README 优雅更新完成！")
          EOF
          
          # 执行生成好的 Python 脚本
          python update_readme.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 提交主页和新生成的三大数据文件
          git add README.md result.txt ipv4-top5.txt ipv6-top5.txt

          if git diff --staged --quiet; then
            echo "没有变化，不提交"
          else
            git commit -m "🤖 Auto update IPv4 & IPv6 FastIP results"
            git push
          fi
