name: Daily FastIP Checker

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码 (Checkout)
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # 开启 pip 依赖自动缓存

    - name: 缓存 Playwright 浏览器内核
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
        # 判断：如果没命中缓存，就完整下载并安装内核及依赖；如果命中了，就只安装系统底层依赖（极快）
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
          playwright install --with-deps chromium
        else
          playwright install-deps chromium
        fi

    - name: 运行测速脚本生成结果
      run: |
        python fastip.py > result.txt
        cat result.txt

    - name: 自动更新 README.md
      run: |
        python - <<'EOF'
        import re
        from datetime import datetime, timezone, timedelta
        
        # 1. 获取当前的北京时间 (UTC+8)
        tz_beijing = timezone(timedelta(hours=8))
        update_time = datetime.now(tz_beijing).strftime('%Y-%m-%d %H:%M:%S')
        
        # 2. 读取测速结果
        try:
            with open('result.txt', 'r', encoding='utf-8') as f:
                result_content = f.read()
        except FileNotFoundError:
            print("未找到 result.txt，测速可能失败了。")
            exit(1)
            
        # 3. 读取原始 README
        with open('README.md', 'r', encoding='utf-8') as f:
            readme = f.read()
            
        # 4. 组装带时间戳和代码块的 Markdown 文本
        new_text = f"\n> 🕒 **最后更新时间:** {update_time} (北京时间)\n\n```text\n{result_content}\n```\n"
        
        # 5. 使用正则替换标签中间的内容
        new_readme = re.sub(r'.*?', new_text, readme, flags=re.DOTALL)
        
        # 6. 覆写 README
        with open('README.md', 'w', encoding='utf-8') as f:
            f.write(new_readme)
            
        print("✅ README.md 组装完成！")
        EOF

    - name: 提交并推送到 GitHub 仓库
      run: |
        # 配置 Git 机器人身份
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 将 result.txt 和更新后的 README.md 添加到暂存区
        git add result.txt README.md
        
        # 提交更改 (如果内容没变就不会提交)
        git commit -m "🤖 Auto update IP ranking results" || echo "No changes to commit"
        
        # 推送回主分支
        git push
